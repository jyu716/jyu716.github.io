about_content: | # this will include new lines to allow paragraphs
  네이티브 앱과 WebView 기반 서비스 앱을 개발하며 서비스 최적화와 안정성 개선 경험을 쌓아온 6년차 Android 개발자 정연욱입니다.  
  문제가 발생했을 때 끝까지 해결하는 과정을 반복하며 서비스 품질을 개선해왔고, 이를 통해 끈기 있는 문제 해결 역량을 길러왔습니다.
  
content:
  - title: Experience # Title for the section
    layout: list # Type of content section (list/text)
    # 더팩트 라인
    content:
      - layout: left
        title: The Fact (더팩트)
        link: https://www.tf.co.kr/
        # link_text: boringcompany.com
        sub_title: 모바일 개발자 (Android, iOS)
        caption: 2024.07 ~ 현재
        quote: >
          [팬앤스타] 좋아하는 스타에게 투표하여 연말 시상식 무대를 선물하고, 전광판 광고 등 다양한 서포트를 진행하는 팬 주도형 아이돌 소통 앱
          
        description: | # this will include new lines to allow paragraphs
          [AOS, iOS 공통]
          - WebView(Android) / WKWebView(iOS) 기반 하이브리드 아키텍처 설계 및 운영
           
            → 앱-웹 간 기능 의존도가 높은 구조에서 안정적인 인터페이스 환경 구축
          
          - JavaScript Bridge 구조 표준화
            
            → 앱-웹 간 데이터 통신 및 결제/광고/파일 다운로드 기능 연동 구조 통합
          
          - 인증 안정성 개선
           
            → 로그인 및 결제 과정에서 발생하던 쿠키/세션 불일치 문제 해결로 인증 실패 케이스 감소
          
          - 인앱 결제 시스템 구축 및 안정화
            
            → 서버 API 연동 및 결제 실패/중복 처리 방지 로직(Idempotency) 적용으로 결제 신뢰도 향상
          
          - Push 알림 및 광고 SDK 운영 구조 개선
            
            → SDK 버전 업데이트 대응 및 초기화/로딩 구조 개선을 통해 앱 안정성 유지

          
          [Android] 
          - Java → Kotlin 마이그레이션 및 Coroutine 도입
           
            → 레거시 코드 구조 개선 및 비동기 처리 안정성 향상
          
          - Google Play Billing 기반 결제 시스템 구현
            
            → 상품 관리 및 결제 흐름 설계, 서버 연동 구조 구축
          
          - WorkManager 기반 결제 복구 로직 구현
            
            → 앱 종료/네트워크 실패 상황에서도 결제 유실 방지
          
          - Google Play 정책 대응
            
            → Age Signals API 적용 및 국가별 연령 정책 대응, Google play Billing 정책 대응
          
          - 광고 SDK 성능 개선 (ANR 대응)
            
            → 초기화 과정의 메인 스레드 블로킹 제거로 ANR 발생률 감소


          [iOS]
          - Safari 로그인 이후 앱 복귀 시 세션 유지 처리
            
            → 인증 흐름 단절 문제 해결 및 사용자 로그인 경험 개선
            
          - StoreKit 기반 인앱 결제 구현 및 서버 연동
            
            → 영수증 검증(Receipt Validation) 및 결제 상태 관리 로직 구성

          - WKScriptMessageHandler 기반 JS Bridge 구현
           
            → 타입 안전한 앱-웹 간 통신 구조 설계 및 유지보수성 개선
            
          - iOS 정책 및 권한 대응
            
            → ATT(App Tracking Transparency) 및 개인정보 권한 흐름 개선


    # 넥스트라인코드 (토파스)
      - layout: left
        title: 넥스트라인코드
        # link_text: boringcompany.com
        sub_title: 모바일 개발자 (Android)
        caption: 2023.01 ~ 2024.03
        quote: >
          [트립코디] 한진 계열사인 토파스 여행정보 에서 운영하던 자체서비스로 여행에 관한 정보를 공유하고 자랑하는 여행자들을 위한 앱
          
        description: | # this will include new lines to allow paragraphs
          [Android] 
          - Google Map 기반 위치 중심 콘텐츠 탐색 기능 구현
          
            → 사용자 현재 위치 및 지도 좌표 기준으로 주변 숙소, 맛집, 관광지 데이터 동적 조회

          - 여행 콘텐츠 업로드 및 SNS 기능 개발
          
            → 이미지/영상/텍스트 기반 게시글 작성 및 공유, 카테고리 기반 콘텐츠 탐색 구조 구현

          - Push 알림 시스템 개선
          
            → 기존 단순 알림 구조를 카테고리 기반으로 재설계하여 사용자 맞춤 알림 제공

          - 앱 초기 진입 및 상태 관리 로직 구현
          
            → 서버 상태 체크, 업데이트 유도, 약관 변경 대응 등 앱 실행 흐름 안정화

          - 사용자 콘텐츠 관리 기능 개선
            → 이미지 단일 업로드에서 멀티 업로드로 변경
            → 업로드한 게시글 다운로드 기능 추가 및 관련 API 연동
            
            
    # 플레이헤드
      - layout: left
        title: 플레이헤드
        # link_text: boringcompany.com
        sub_title: 모바일 개발자 (Android)
        caption: 2019.11 ~ 2023.01
        quote: >
          [OpenVerse] 하나의 노래를 여러 사용자가 ‘이어’부르며 각자의 개성으로 새롭게 하나의 노래를 재창조하는 SNS기반의 엔터테인먼트 앱
          
        description: | # this will include new lines to allow paragraphs
          [Android] 
          - ExoPlayer 기반 영상 스트리밍 및 재생 기능 구현
          
            → 다양한 영상 콘텐츠를 안정적으로 처리할 수 있는 재생 구조 설계

          - 영상 기반 SNS 핵심 기능 개발
          
            → 좋아요, 댓글, 팔로우, 이어부르기 등 사용자 참여 기능 구현

          - ViewPager, RecyclerView, Fragment 기반 화면 구성
          
            → 리스트/피드 구조 및 화면 전환을 효율적으로 처리하고, Fragment 재사용을 통한 UI 구조 설계

          - 콘텐츠 소비 UX 개선
          
             → 스크롤 및 영상 재생 상태에 따라 자동 재생과 다음 콘텐츠 노출이 자연스럽게 이어지도록 구현

          - SNS 로그인 및 인증 구조 구축
          
            → Google, Kakao, Facebook, Apple 로그인 연동 및 사용자 인증 흐름 구현

          - 검색 및 추천 콘텐츠 기능 개발
          
            → 태그 및 유저 기반 검색, 추천 영상 노출 기능 구현

          - Firebase 기반 서비스 연동
          
            → FCM Push, Dynamic Link를 활용한 사용자 유입 및 알림 기능 구현
            
            
